// DuckDB gRPC Server — Protocol Definition
//
// This proto defines the RPC surface for the DuckDB server.
// All data is transferred as protobuf messages — no Arrow dependency.
//
// Cross-language: generate client/server stubs for any language with
//   protoc --<lang>_out --grpc_out proto/duckdb_service.proto

syntax = "proto3";

package duckdb.v1;

option csharp_namespace = "DuckDbProto";

// The DuckDB query service.
service DuckDbService {

  // Execute a SELECT query and stream results as rows.
  // First response contains the column schema.
  // Subsequent responses contain batches of rows.
  rpc Query (QueryRequest) returns (stream QueryResponse);

  // Execute a DML or DDL statement.
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);

  // Liveness check.
  rpc Ping (PingRequest) returns (PingResponse);

  // Live server metrics.
  rpc GetStats (StatsRequest) returns (StatsResponse);
}

// ── Query ────────────────────────────────────────────────────────────────────

message QueryRequest {
  string sql = 1;
}

message QueryResponse {
  // Column metadata (sent in the first response only).
  repeated ColumnInfo columns = 1;

  // Row data (sent in subsequent responses, batched for efficiency).
  repeated Row rows = 2;
}

// Column metadata describing one column in the result set.
message ColumnInfo {
  string name = 1;
  string type = 2;  // DuckDB type name: INTEGER, VARCHAR, DOUBLE, BOOLEAN, etc.
}

// A single row of data. Values are encoded as strings for simplicity.
// NULL values have is_null = true.
message Row {
  repeated Value values = 1;
}

message Value {
  string text = 1;     // String representation of the value.
  bool is_null = 2;    // True if the value is NULL.
}

// ── Execute ──────────────────────────────────────────────────────────────────

message ExecuteRequest {
  string sql = 1;
}

message ExecuteResponse {
  bool success = 1;
  string error = 2;
}

// ── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {}

message PingResponse {
  string message = 1;
}

// ── Stats ────────────────────────────────────────────────────────────────────

message StatsRequest {}

message StatsResponse {
  int64 queries_read = 1;
  int64 queries_write = 2;
  int64 errors = 3;
  int32 reader_pool_size = 4;
  int32 port = 5;
}
