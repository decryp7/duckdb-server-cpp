// ============================================================================
// DuckDB gRPC Server — Protocol Definition v5.2
// ============================================================================
//
// This proto defines the gRPC service for all three server implementations
// (C#, C++, Rust). Any client generated from this proto can talk to any server.
//
// KEY DESIGN DECISION: COLUMNAR ENCODING
//
//   Values are packed into typed arrays per column, not wrapped in per-cell
//   messages. This eliminates ~99% of protobuf object allocations compared
//   to traditional row-by-row encoding.
//
//   Performance comparison for 1000 rows × 10 columns:
//     Row format:     10,000 TypedValue + 1,000 Row objects = 11,000 allocs
//     Columnar (this): 10 ColumnData with packed repeated    = 10 allocs
//
//   Packed repeated fields (e.g. repeated int32 [packed=true]) are stored
//   as contiguous byte arrays in the protobuf wire format, enabling memcpy
//   from DuckDB's internal columnar storage directly into protobuf buffers.
//
// NULL HANDLING:
//   Rather than a separate oneof/optional per value, null row indices are
//   stored in a sparse list (null_indices). This avoids per-cell overhead
//   for the common case where most values are non-null.
//
// TYPE WIDENING:
//   DuckDB INT8/INT16/UINT8/UINT16 are widened to int32 in the proto
//   (protobuf has no native 8/16-bit types). UINT32 is widened to int64.
//   DECIMAL is stored as double (lossy for >15 significant digits).
//
// GENERATED CODE:
//   C#:   generate_proto.bat → shared/Generated/DuckdbService.cs
//   C++:  protoc via DuckDbServerCpp.vcxproj pre-build step
//   Rust: tonic-build in rust-server/build.rs
// ============================================================================

syntax = "proto3";

package duckdb.v1;

// C# namespace for generated code (used by Grpc.Core 2.46.6 / .NET 4.6.2)
option csharp_namespace = "DuckDbProto";

// ============================================================================
// Service Definition
// ============================================================================
//
// Five RPCs covering read, write, bulk load, health check, and monitoring.
// All RPCs use unary request/response except Query which is server-streaming
// to handle result sets larger than a single gRPC message (max 64MB default).
service DuckDbService {

  // Execute a SQL SELECT query and stream columnar results.
  rpc Query (QueryRequest) returns (stream QueryResponse);

  // Execute a SQL SELECT and stream results as Arrow IPC batches.
  // Zero-copy: server serializes DuckDB's internal Arrow buffers directly.
  // Clients with Arrow support should prefer this over Query for large results.
  // Falls back to error if server doesn't support Arrow (e.g. C# server).
  rpc QueryArrow (QueryRequest) returns (stream ArrowResponse);

  // Execute a DML or DDL statement (INSERT, UPDATE, DELETE, CREATE TABLE, etc.)
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);

  // Bulk insert columnar data into an existing table.
  rpc BulkInsert (BulkInsertRequest) returns (BulkInsertResponse);

  // Health check. Returns "pong".
  rpc Ping (PingRequest) returns (PingResponse);

  // Server metrics.
  rpc GetStats (StatsRequest) returns (StatsResponse);
}

// ── Query ────────────────────────────────────────────────────────────────────

message QueryRequest {
  string sql = 1;
}

// Each QueryResponse contains a batch of rows in COLUMNAR format.
// First response includes column metadata. All responses include data columns.
message QueryResponse {
  repeated ColumnMeta columns = 1;   // Column metadata (first message only)
  repeated ColumnData data = 2;      // Column data (every message)
  int32 row_count = 3;               // Number of rows in this batch
}

message ColumnMeta {
  string name = 1;
  ColumnType type = 2;
}

// Column type enum mapping DuckDB types to protobuf storage fields.
//
// Type widening rules (protobuf has no native 8/16-bit integer types):
//   DuckDB TINYINT  (INT8)    → TYPE_INT8   → stored in int32_values
//   DuckDB SMALLINT (INT16)   → TYPE_INT16  → stored in int32_values
//   DuckDB UTINYINT (UINT8)   → TYPE_UINT8  → stored in int32_values
//   DuckDB USMALLINT(UINT16)  → TYPE_UINT16 → stored in int32_values
//   DuckDB UINTEGER (UINT32)  → TYPE_UINT32 → stored in int64_values (widened)
//   DuckDB UBIGINT  (UINT64)  → TYPE_UINT64 → stored in int64_values (reinterpreted)
//   DuckDB DECIMAL           → TYPE_DECIMAL → stored in double_values (lossy)
enum ColumnType {
  TYPE_UNKNOWN = 0;    // Fallback — treated as string
  TYPE_BOOLEAN = 1;    // DuckDB BOOLEAN  → bool_values
  TYPE_INT32 = 2;      // DuckDB INTEGER  → int32_values
  TYPE_INT64 = 3;      // DuckDB BIGINT   → int64_values
  TYPE_FLOAT = 4;      // DuckDB FLOAT    → float_values
  TYPE_DOUBLE = 5;     // DuckDB DOUBLE   → double_values
  TYPE_STRING = 6;     // DuckDB VARCHAR   → string_values
  TYPE_BLOB = 7;       // DuckDB BLOB     → blob_values
  TYPE_TIMESTAMP = 8;  // DuckDB TIMESTAMP → string_values (ISO 8601)
  TYPE_DATE = 9;       // DuckDB DATE     → string_values (YYYY-MM-DD)
  TYPE_TIME = 10;      // DuckDB TIME     → string_values (HH:MM:SS)
  TYPE_DECIMAL = 11;   // DuckDB DECIMAL  → double_values (lossy for >15 digits)
  TYPE_INT8 = 12;      // DuckDB TINYINT  → int32_values (widened from 1 byte)
  TYPE_INT16 = 13;     // DuckDB SMALLINT → int32_values (widened from 2 bytes)
  TYPE_UINT8 = 14;     // DuckDB UTINYINT → int32_values (widened from 1 byte)
  TYPE_UINT16 = 15;    // DuckDB USMALLINT→ int32_values (widened from 2 bytes)
  TYPE_UINT32 = 16;    // DuckDB UINTEGER → int64_values (widened from 4 bytes)
  TYPE_UINT64 = 17;    // DuckDB UBIGINT  → int64_values (same 8 bytes, sign reinterpreted)
}

// Columnar data for one column in a batch.
// Only one of the repeated fields is populated, based on ColumnType.
// Packed repeated fields use minimal protobuf overhead.
//
// NULL handling: the nulls bitmask indicates which row indices are null.
// If nulls is empty, no values are null.
message ColumnData {
  // Packed arrays — one per type. Only one is populated per column.
  repeated bool bool_values = 1 [packed = true];
  repeated int32 int32_values = 2 [packed = true];
  repeated int64 int64_values = 3 [packed = true];
  repeated float float_values = 4 [packed = true];
  repeated double double_values = 5 [packed = true];
  repeated string string_values = 6;
  repeated bytes blob_values = 7;

  // Null bitmask: indices of rows that are NULL.
  // If empty, all values are non-null.
  repeated int32 null_indices = 15 [packed = true];
}

// ── Arrow IPC Response ──────────────────────────────────────────────────────

// Arrow IPC response: zero-copy wire format for high-throughput reads.
// Each message contains one Arrow IPC record batch as raw bytes.
// First message includes the schema (Arrow IPC schema message).
// Clients deserialize using any Arrow IPC reader (pyarrow, arrow-rs, etc.)
message ArrowResponse {
  bytes ipc_data = 1;           // Arrow IPC record batch (or schema for first msg)
  int32 row_count = 2;          // Number of rows in this batch (0 for schema-only msg)
}

// ── Execute ──────────────────────────────────────────────────────────────────

message ExecuteRequest {
  string sql = 1;
}

message ExecuteResponse {
  bool success = 1;
  string error = 2;
}

// ── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {}

message PingResponse {
  string message = 1;
}

// ── Stats ────────────────────────────────────────────────────────────────────

message StatsRequest {}

message StatsResponse {
  int64 queries_read = 1;
  int64 queries_write = 2;
  int64 errors = 3;
  int32 reader_pool_size = 4;
  int32 port = 5;
}

// ── BulkInsert ───────────────────────────────────────────────────────────────

// Bulk insert request: columnar data written directly via DuckDB Appender API.
// 100x faster than individual INSERT SQL statements because it bypasses
// the SQL parser, planner, and optimizer entirely.
//
// Usage:
//   client.BulkInsert({table: "events", columns: [...], data: [...]})
//
// The table must already exist. Column order must match the schema.
message BulkInsertRequest {
  string table = 1;                    // Target table name
  repeated ColumnMeta columns = 2;     // Column metadata (names + types)
  repeated ColumnData data = 3;        // Columnar data (same format as QueryResponse)
  int32 row_count = 4;                 // Number of rows in this batch
  repeated string sort_columns = 5;    // Optional: sort data by these columns before insert.
                                       // Improves zonemap effectiveness for selective reads.
                                       // Empty = no sorting (default, fastest insert speed).
}

message BulkInsertResponse {
  bool success = 1;
  string error = 2;
  int64 rows_inserted = 3;             // Number of rows successfully inserted
}
