// DuckDB gRPC Server — Protocol Definition v5.2
//
// COLUMNAR encoding: values are packed into typed arrays per column,
// not wrapped in per-cell messages. This eliminates ~99% of protobuf
// object allocations compared to row-by-row encoding.
//
// 1000 rows × 10 columns:
//   Row format:  10,000 TypedValue objects + 1,000 Row objects = 11,000 allocs
//   Columnar:    10 Column objects with packed repeated fields = 10 allocs

syntax = "proto3";

package duckdb.v1;

option csharp_namespace = "DuckDbProto";

service DuckDbService {
  rpc Query (QueryRequest) returns (stream QueryResponse);
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);

  // Bulk insert using DuckDB Appender API (100x faster than INSERT SQL).
  // Bypasses SQL parser entirely — writes directly to storage.
  // Client sends columnar data; server appends via duckdb_appender.
  rpc BulkInsert (BulkInsertRequest) returns (BulkInsertResponse);
  rpc Ping (PingRequest) returns (PingResponse);
  rpc GetStats (StatsRequest) returns (StatsResponse);
}

// ── Query ────────────────────────────────────────────────────────────────────

message QueryRequest {
  string sql = 1;
}

// Each QueryResponse contains a batch of rows in COLUMNAR format.
// First response includes column metadata. All responses include data columns.
message QueryResponse {
  repeated ColumnMeta columns = 1;   // Column metadata (first message only)
  repeated ColumnData data = 2;      // Column data (every message)
  int32 row_count = 3;               // Number of rows in this batch
}

message ColumnMeta {
  string name = 1;
  ColumnType type = 2;
}

enum ColumnType {
  TYPE_UNKNOWN = 0;
  TYPE_BOOLEAN = 1;
  TYPE_INT32 = 2;
  TYPE_INT64 = 3;
  TYPE_FLOAT = 4;
  TYPE_DOUBLE = 5;
  TYPE_STRING = 6;
  TYPE_BLOB = 7;
  TYPE_TIMESTAMP = 8;
  TYPE_DATE = 9;
  TYPE_TIME = 10;
  TYPE_DECIMAL = 11;
  TYPE_INT8 = 12;
  TYPE_INT16 = 13;
  TYPE_UINT8 = 14;
  TYPE_UINT16 = 15;
  TYPE_UINT32 = 16;
  TYPE_UINT64 = 17;
}

// Columnar data for one column in a batch.
// Only one of the repeated fields is populated, based on ColumnType.
// Packed repeated fields use minimal protobuf overhead.
//
// NULL handling: the nulls bitmask indicates which row indices are null.
// If nulls is empty, no values are null.
message ColumnData {
  // Packed arrays — one per type. Only one is populated per column.
  repeated bool bool_values = 1 [packed = true];
  repeated int32 int32_values = 2 [packed = true];
  repeated int64 int64_values = 3 [packed = true];
  repeated float float_values = 4 [packed = true];
  repeated double double_values = 5 [packed = true];
  repeated string string_values = 6;
  repeated bytes blob_values = 7;

  // Null bitmask: indices of rows that are NULL.
  // If empty, all values are non-null.
  repeated int32 null_indices = 15 [packed = true];
}

// ── Execute ──────────────────────────────────────────────────────────────────

message ExecuteRequest {
  string sql = 1;
}

message ExecuteResponse {
  bool success = 1;
  string error = 2;
}

// ── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {}

message PingResponse {
  string message = 1;
}

// ── Stats ────────────────────────────────────────────────────────────────────

message StatsRequest {}

message StatsResponse {
  int64 queries_read = 1;
  int64 queries_write = 2;
  int64 errors = 3;
  int32 reader_pool_size = 4;
  int32 port = 5;
}

// ── BulkInsert ───────────────────────────────────────────────────────────────

// Bulk insert request: columnar data written directly via DuckDB Appender API.
// 100x faster than individual INSERT SQL statements because it bypasses
// the SQL parser, planner, and optimizer entirely.
//
// Usage:
//   client.BulkInsert({table: "events", columns: [...], data: [...]})
//
// The table must already exist. Column order must match the schema.
message BulkInsertRequest {
  string table = 1;                    // Target table name
  repeated ColumnMeta columns = 2;     // Column metadata (names + types)
  repeated ColumnData data = 3;        // Columnar data (same format as QueryResponse)
  int32 row_count = 4;                 // Number of rows in this batch
}

message BulkInsertResponse {
  bool success = 1;
  string error = 2;
  int64 rows_inserted = 3;             // Number of rows successfully inserted
}
