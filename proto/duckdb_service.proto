// DuckDB gRPC Server — Protocol Definition v5.1
//
// Pure protobuf, no Arrow dependency.
// Uses typed values (int64, double, bool, string, bytes) to avoid
// ToString/Parse overhead. ~3x faster than string-only encoding.
//
// Cross-language: generate stubs with protoc for any language.

syntax = "proto3";

package duckdb.v1;

option csharp_namespace = "DuckDbProto";

service DuckDbService {
  rpc Query (QueryRequest) returns (stream QueryResponse);
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);
  rpc Ping (PingRequest) returns (PingResponse);
  rpc GetStats (StatsRequest) returns (StatsResponse);
}

// ── Query ────────────────────────────────────────────────────────────────────

message QueryRequest {
  string sql = 1;
}

message QueryResponse {
  repeated ColumnInfo columns = 1;  // First message only
  repeated Row rows = 2;           // Subsequent messages
}

message ColumnInfo {
  string name = 1;
  ColumnType type = 2;
}

enum ColumnType {
  TYPE_UNKNOWN = 0;
  TYPE_BOOLEAN = 1;
  TYPE_INT32 = 2;
  TYPE_INT64 = 3;
  TYPE_FLOAT = 4;
  TYPE_DOUBLE = 5;
  TYPE_STRING = 6;
  TYPE_BLOB = 7;
  TYPE_TIMESTAMP = 8;
  TYPE_DATE = 9;
  TYPE_TIME = 10;
  TYPE_DECIMAL = 11;
  TYPE_INT8 = 12;
  TYPE_INT16 = 13;
  TYPE_UINT8 = 14;
  TYPE_UINT16 = 15;
  TYPE_UINT32 = 16;
  TYPE_UINT64 = 17;
}

// A row of typed values. Using oneof avoids ToString/Parse overhead.
message Row {
  repeated TypedValue values = 1;
}

// A single typed value. Only one field is set based on the column type.
// This is ~3x faster than encoding everything as strings because:
//   - int64/double are encoded as 8 raw bytes (no formatting)
//   - bool is 1 byte (not "True"/"False" string)
//   - protobuf varint encoding is faster than decimal string formatting
message TypedValue {
  oneof kind {
    bool is_null = 1;       // NULL value
    bool bool_value = 2;    // BOOLEAN
    int32 int32_value = 3;  // INTEGER, SMALLINT, TINYINT
    int64 int64_value = 4;  // BIGINT
    double double_value = 5;// DOUBLE, FLOAT, DECIMAL
    string string_value = 6;// VARCHAR, TIMESTAMP, DATE, TIME, etc.
    bytes blob_value = 7;   // BLOB
  }
}

// ── Execute ──────────────────────────────────────────────────────────────────

message ExecuteRequest {
  string sql = 1;
}

message ExecuteResponse {
  bool success = 1;
  string error = 2;
}

// ── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {}

message PingResponse {
  string message = 1;
}

// ── Stats ────────────────────────────────────────────────────────────────────

message StatsRequest {}

message StatsResponse {
  int64 queries_read = 1;
  int64 queries_write = 2;
  int64 errors = 3;
  int32 reader_pool_size = 4;
  int32 port = 5;
}
